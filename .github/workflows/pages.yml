name: pages
on:
  push:
    branches: [main]
    paths:
      - 'data/published/**'
  # Bot pushes (GITHUB_TOKEN) never trigger `push` workflows by GitHub design,
  # so the nightly publish commit must chain the deploy via workflow_run.
  workflow_run:
    workflows: [nightly-reduce]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: data/published
      - id: deployment
        uses: actions/deploy-pages@v4
