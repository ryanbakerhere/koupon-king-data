name: nightly-reduce
on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  reduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Publish jitter (SPEC §13.2): decouple publish timing from crawl patterns.
      - name: Jitter
        run: sleep $((RANDOM % 900))
      - name: Publish snapshots
        id: publish
        continue-on-error: true
        run: node reduce/src/publish.js
      - name: Commit published data
        run: |
          git config user.name "koupon-king-reduce[bot]"
          git config user.email "reduce-bot@users.noreply.github.com"
          git add data/published
          git diff --cached --quiet || git commit -m "reduce: nightly publish $(date -u +%F)"
          git push
      - name: Fail the run if any snapshot was rejected
        if: steps.publish.outcome == 'failure'
        run: exit 1
